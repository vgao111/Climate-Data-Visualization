<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Global Climate Explorer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>Global Climate Explorer</h1>
    <p>Surface temperature change 1850–2014 | Click any country to explore</p>
  </header>

  <main>

    <!-- ── View 1: World Map ───────────────────────────────────────────────── -->
    <div id="map-view">
      <div id="map-top-bar">
        <span id="map-hint">Hover a country to preview · Click to explore its full history</span>
        <div id="legend-wrap">
          <span class="leg-label">0°C</span>
          <svg id="legend-svg"></svg>
          <span class="leg-label">+3°C</span>
        </div>
      </div>
      <svg id="world-map"></svg>
      <div id="tooltip"></div>
    </div>

    <!-- ── View 2: Country Detail ──────────────────────────────────────────── -->
    <div id="detail-view">

      <div id="detail-header">
        <button id="back-btn">← World Map</button>
        <div id="country-info">
          <h2 id="country-name"></h2>
          <p id="country-stat"></p>
        </div>
      </div>

      <div id="controls-row">
        <div id="metric-tabs">
          <button class="tab-btn active" data-metric="annual">Annual Anomaly</button>
          <button class="tab-btn"        data-metric="decadal">Decadal Means</button>
        </div>
        <div id="sliders">
          <label>From <strong id="lbl-start">1850</strong>
            <input type="range" id="slider-start" min="1850" max="2014" value="1850" />
          </label>
          <label>To <strong id="lbl-end">2014</strong>
            <input type="range" id="slider-end" min="1850" max="2014" value="2014" />
          </label>
        </div>
      </div>

      <svg id="detail-chart"></svg>

    </div>

  </main>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="climate.js"></script>
</body>
</html>
